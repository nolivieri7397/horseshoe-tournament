
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.container { padding: 1rem; max-width: 100%; }
.section { margin-bottom: 1.5rem; }
h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; }
h3 { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.75rem; }
.input-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
input[type=text], input[type=number], select { flex: 1; }
.btn { padding: 8px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; font-size: 14px; }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { background: var(--color-background-danger); color: var(--color-text-danger); border-color: var(--color-border-danger); }
.player-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 99px; padding: 4px 12px; font-size: 13px; margin: 4px; }
.player-chip button { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; line-height: 1; padding: 0; }
.player-chip button:hover { color: var(--color-text-danger); }
.chips-wrap { display: flex; flex-wrap: wrap; margin-bottom: 0.75rem; min-height: 40px; }
.bracket-wrap { overflow-x: auto; }
.bracket { display: flex; gap: 24px; align-items: flex-start; }
.round { display: flex; flex-direction: column; gap: 0; min-width: 160px; }
.round-label { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-bottom: 8px; font-weight: 500; }
.match { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; margin-bottom: 16px; background: var(--color-background-primary); }
.match-player { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; font-size: 13px; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; gap: 6px; }
.match-player:last-child { border-bottom: none; }
.match-player:hover { background: var(--color-background-secondary); }
.match-player.winner { background: var(--color-background-success); color: var(--color-text-success); font-weight: 500; }
.match-player.tbd { color: var(--color-text-secondary); font-style: italic; }
.score-input { width: 36px; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; text-align: center; font-size: 13px; padding: 2px 4px; background: var(--color-background-primary); color: var(--color-text-primary); }
.notify-section { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
.notify-form { display: flex; flex-direction: column; gap: 8px; }
.status-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.badge { font-size: 12px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
.badge-blue { background: var(--color-background-info); color: var(--color-text-info); }
.badge-green { background: var(--color-background-success); color: var(--color-text-success); }
.badge-amber { background: var(--color-background-warning); color: var(--color-text-warning); }
.empty-state { color: var(--color-text-secondary); font-size: 14px; text-align: center; padding: 2rem; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); }
.notif-log { margin-top: 0.75rem; max-height: 100px; overflow-y: auto; }
.notif-item { font-size: 12px; color: var(--color-text-secondary); padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.spacer { flex: 1; }
</style>

<div class="container">
  <h2><i class="ti ti-trophy" aria-hidden="true"></i> Horseshoe Tournament</h2>

  <div class="section" id="setup-section">
    <h3>Add players</h3>
    <div class="input-row">
      <input type="text" id="player-input" placeholder="Player name" />
      <button class="btn btn-primary" onclick="addPlayer()"><i class="ti ti-plus"></i> Add</button>
    </div>
    <div class="chips-wrap" id="chips"></div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <select id="format-select" style="max-width:180px;">
        <option value="single">Single elimination</option>
        <option value="double">Double elimination</option>
        <option value="roundrobin">Round robin</option>
      </select>
      <button class="btn btn-primary" onclick="generateBracket()" id="gen-btn" disabled>
        Generate bracket ↗
      </button>
      <button class="btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="bracket-section" style="display:none;">
    <div class="status-bar" id="status-bar"></div>
    <div class="section">
      <h3>Bracket — click a player to mark as winner, enter scores</h3>
      <div class="bracket-wrap">
        <div class="bracket" id="bracket"></div>
      </div>
    </div>

    <div class="section">
      <div class="notify-section">
        <h3><i class="ti ti-bell" aria-hidden="true"></i> Player notifications</h3>
        <p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:0.75rem;">Send an SMS-style alert to a player that they're almost up.</p>
        <div class="notify-form">
          <div class="input-row">
            <select id="notify-player" style="flex:1;"></select>
            <button class="btn btn-primary" onclick="sendNotification()"><i class="ti ti-send"></i> Alert</button>
          </div>
          <input type="text" id="notify-msg" placeholder="Custom message (optional)" />
        </div>
        <div class="notif-log" id="notif-log"></div>
      </div>
    </div>
  </div>
</div>

<script>
let players = [];
let bracket = [];
let notifLog = [];
let format = 'single';

const playerInput = document.getElementById('player-input');
playerInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

function addPlayer() {
  const name = playerInput.value.trim();
  if (!name || players.includes(name)) { playerInput.value = ''; return; }
  players.push(name);
  playerInput.value = '';
  renderChips();
  document.getElementById('gen-btn').disabled = players.length < 2;
}

function removePlayer(name) {
  players = players.filter(p => p !== name);
  renderChips();
  document.getElementById('gen-btn').disabled = players.length < 2;
}

function renderChips() {
  const wrap = document.getElementById('chips');
  wrap.innerHTML = players.map(p =>
    `<span class="player-chip">${p}<button onclick="removePlayer('${p.replace(/'/g,"\\'")}')">×</button></span>`
  ).join('');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextPowerOf2(n) {
  let p = 1; while (p < n) p *= 2; return p;
}

function generateBracket() {
  format = document.getElementById('format-select').value;
  const shuffled = shuffle(players);
  const size = nextPowerOf2(shuffled.length);
  const seeded = [...shuffled];
  while (seeded.length < size) seeded.push(null);

  bracket = [];
  const r1matches = [];
  for (let i = 0; i < size; i += 2) {
    r1matches.push({ p1: seeded[i], p2: seeded[i+1], s1: '', s2: '', winner: null, id: `0-${i/2}` });
  }
  bracket.push(r1matches);

  let prev = r1matches;
  while (prev.length > 1) {
    const next = [];
    for (let i = 0; i < prev.length; i += 2) {
      next.push({ p1: null, p2: null, s1: '', s2: '', winner: null, id: `${bracket.length}-${i/2}`, from: [prev[i].id, prev[i+1].id] });
    }
    bracket.push(next);
    prev = next;
  }

  document.getElementById('setup-section').style.display = '';
  document.getElementById('bracket-section').style.display = '';
  renderBracket();
  renderNotifyPlayers();
  updateStatus();
}

function renderBracket() {
  const el = document.getElementById('bracket');
  el.innerHTML = '';
  bracket.forEach((round, ri) => {
    const roundDiv = document.createElement('div');
    roundDiv.className = 'round';
    const totalRounds = bracket.length;
    const label = ri === totalRounds - 1 ? 'Final' : ri === totalRounds - 2 ? 'Semifinals' : `Round ${ri + 1}`;
    roundDiv.innerHTML = `<div class="round-label">${label}</div>`;
    const spacer = Math.pow(2, ri) * 8;
    round.forEach((match, mi) => {
      const matchDiv = document.createElement('div');
      matchDiv.className = 'match';
      if (ri > 0) matchDiv.style.marginTop = `${spacer}px`;
      matchDiv.innerHTML = playerRow(match, 'p1', 's1') + playerRow(match, 'p2', 's2');
      roundDiv.appendChild(matchDiv);
    });
    el.appendChild(roundDiv);
  });
}

function playerRow(match, pk, sk) {
  const name = match[pk];
  const score = match[sk];
  const isWinner = match.winner === name && name !== null;
  const isTbd = name === null;
  const cls = isWinner ? 'match-player winner' : isTbd ? 'match-player tbd' : 'match-player';
  const displayName = isTbd ? 'TBD' : name;
  const scoreEl = (!isTbd) ? `<input class="score-input" type="number" min="0" value="${score}" placeholder="0" onchange="setScore('${match.id}','${sk}',this.value)" onclick="event.stopPropagation()" />` : '';
  const onclick = (!isTbd) ? `onclick="setWinner('${match.id}','${pk}')"` : '';
  return `<div class="${cls}" ${onclick} title="${!isTbd ? 'Click to mark as winner' : ''}">${displayName}<span style="display:flex;align-items:center;gap:4px;">${scoreEl}</span></div>`;
}

function findMatch(id) {
  for (const round of bracket) for (const m of round) if (m.id === id) return m;
  return null;
}

function setScore(id, sk, val) {
  const m = findMatch(id);
  if (m) { m[sk] = val; updateStatus(); }
}

function setWinner(id, pk) {
  const m = findMatch(id);
  if (!m || !m[pk]) return;
  m.winner = m[pk];
  propagateWinner(id, m.winner);
  renderBracket();
  updateStatus();
}

function propagateWinner(fromId, winner) {
  for (const round of bracket) {
    for (const match of round) {
      if (!match.from) continue;
      const idx = match.from.indexOf(fromId);
      if (idx === 0) { match.p1 = winner; }
      if (idx === 1) { match.p2 = winner; }
    }
  }
}

function updateStatus() {
  const total = bracket.reduce((s, r) => s + r.length, 0);
  const done = bracket.reduce((s, r) => s + r.filter(m => m.winner).length, 0);
  const champion = bracket[bracket.length - 1][0].winner;
  const bar = document.getElementById('status-bar');
  bar.innerHTML = `
    <span class="badge badge-blue"><i class="ti ti-users" aria-hidden="true"></i> ${players.length} players</span>
    <span class="badge badge-amber"><i class="ti ti-tournament" aria-hidden="true"></i> ${done}/${total} matches done</span>
    ${champion ? `<span class="badge badge-green"><i class="ti ti-trophy" aria-hidden="true"></i> Champion: ${champion}</span>` : ''}
  `;
}

function renderNotifyPlayers() {
  const sel = document.getElementById('notify-player');
  sel.innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('');
}

function sendNotification() {
  const player = document.getElementById('notify-player').value;
  const customMsg = document.getElementById('notify-msg').value.trim();
  const msg = customMsg || `${player}, you're almost up! Get ready for your horseshoe match.`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  notifLog.unshift({ player, msg, time });
  renderNotifLog();
  document.getElementById('notify-msg').value = '';
  alert(`📱 Notification sent to ${player}:\n"${msg}"\n\n(In a real app, this would send an SMS via Twilio or similar.)`);
}

function renderNotifLog() {
  const log = document.getElementById('notif-log');
  if (!notifLog.length) { log.innerHTML = ''; return; }
  log.innerHTML = notifLog.map(n =>
    `<div class="notif-item"><strong>${n.time}</strong> → ${n.player}: ${n.msg}</div>`
  ).join('');
}

function resetAll() {
  players = []; bracket = []; notifLog = [];
  renderChips();
  document.getElementById('bracket-section').style.display = 'none';
  document.getElementById('gen-btn').disabled = true;
}
</script>
